# Local development: Postgres only. The app itself runs via `npm run dev`
# on the host (Vite HMR + Node --watch). Production uses the Dockerfile
# against an external Coolify-managed Postgres.

services:
  postgres:
    image: postgres:16-alpine
    container_name: museiris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: museiris
      POSTGRES_USER: museiris
      POSTGRES_PASSWORD: museiris_dev
    ports:
      - "5432:5432"
    volumes:
      - museiris_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U museiris -d museiris"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  museiris_pg:
